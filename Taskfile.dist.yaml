# yaml-language-server: $schema=https://taskfile.dev/schema.json
# Generated by copier from corpus taskfiles; any changes here must be merged.

version: '3'

vars:
    _0: '{{.TASK_DIR}}'
    GIT_REMOTE: '{{.GIT_REMOTE | default "origin"}}'
    CORPUS: '{{.MY_CORPUS | default "~/my/corpus"}}'
    AWT: uv run --project {{.CORPUS}} agent-worktree --repo {{._0}}
    UV: uv --project {{._0}}
    REPO_YAML:
        sh: cat {{._0}}/.repo.yaml 2>/dev/null || echo {}
    REPO:
        ref: fromYaml .REPO_YAML
    _PACKAGE: '{{get .REPO "package"}}'
    SRC_DIR: '{{._0}}/{{._PACKAGE}}'
    DOC_DIR: '{{._0}}/docs'
    DOC_OUT: '{{.DOC_DIR}}/_build'
    OP: podman
    IMG_FILE: Containerfile
    IMG_URL: registry.{{get .REPO "host"}}/{{get .REPO "host_path_full_"}}
    IMG: '{{.IMG_URL}}:latest'

tasks:

    # -------------
    # Moving Tags
    # -------------
    # Core parameterizable task — moves an annotated tag to HEAD and force-pushes.
    # Usage:
    #   task tag:move -- TAG=stable
    #   task tag:move -- TAG=dev MSG="Development snapshot"
    tag:move:
        desc: >-
            Move an annotated git tag to HEAD and force-push it.  Pass
            `TAG=<name>` and optional `MSG=<message>`.
        vars:
            TAG: '{{.TAG | default "stable"}}'
            _HASH:
                sh: git -C {{._0}} rev-parse --short HEAD 2>/dev/null || echo ""
            _MSG: '{{.MSG | default (printf "%s @ %s" .TAG ._HASH)}}'
        preconditions:
            - sh: git -C {{._0}} rev-parse --git-dir > /dev/null 2>&1
              msg: Not inside a git repository.
        prompt: 'Move `{{.TAG}}` tag to HEAD and force-push to `{{.GIT_REMOTE}}`?'
        cmds:
            - cmd: >-
                git -C {{._0}} tag -f -a '{{.TAG}}' HEAD
                -m '{{._MSG}}'
            - cmd: git -C {{._0}} push '{{.GIT_REMOTE}}' '{{.TAG}}' --force

    # Convenience aliases for industry-standard moving tags.
    tag:stable:
        desc: Move the `stable` annotated tag to HEAD and force-push.
        cmds:
            - task: tag:move
              vars: {TAG: stable}

    tag:dev:
        desc: Move the `dev` annotated tag to HEAD and force-push.
        cmds:
            - task: tag:move
              vars: {TAG: dev}

    tag:latest:
        desc: Move the `latest` annotated tag to HEAD and force-push.
        cmds:
            - task: tag:move
              vars: {TAG: latest}

    tag:nightly:
        desc: Move the `nightly` annotated tag to HEAD and force-push.
        cmds:
            - task: tag:move
              vars: {TAG: nightly}

    tag:edge:
        desc: Move the `edge` annotated tag to HEAD and force-push.
        cmds:
            - task: tag:move
              vars: {TAG: edge}

    # -----------------
    # Permanent Tags
    # -----------------
    # Semver version tags — created once, never moved.
    # Usage:
    #   task tag:version -- VERSION=v1.0.0
    #   task tag:version -- VERSION=v1.0.0 MSG="Initial release"
    tag:version:
        desc: >-
            Create a permanent semver version tag at HEAD and push.  Requires
            `VERSION=<v1.0.0>`.  Optional `MSG=<message>`.
        vars:
            VERSION: '{{.VERSION | default ""}}'
            _MSG: '{{.MSG | default (printf "Release %s" .VERSION)}}'
        preconditions:
            - sh: git -C {{._0}} rev-parse --git-dir > /dev/null 2>&1
              msg: Not inside a git repository.
            - sh: '[[ "{{.VERSION}}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]'
              msg: 'VERSION must be a semver string like `v1.0.0` (pass with `VERSION=<v1.0.0>`).'
        prompt: 'Create version tag `{{.VERSION}}` at HEAD and push to `{{.GIT_REMOTE}}`?'
        cmds:
            - cmd: git -C {{._0}} tag -a '{{.VERSION}}' HEAD -m '{{._MSG}}'
            - cmd: git -C {{._0}} push '{{.GIT_REMOTE}}' '{{.VERSION}}'

    # Pre-release tags (rc, beta, alpha).
    # Usage:
    #   task tag:prerelease -- VERSION=v1.0.0-rc.1
    #   task tag:prerelease -- VERSION=v1.0.0-beta.3 MSG="Feature freeze"
    tag:prerelease:
        desc: >-
            Create a pre-release tag (rc/beta/alpha) at HEAD and push.  Requires
            `VERSION=<v1.0.0-rc.1>`.  Optional `MSG=<message>`.
        vars:
            VERSION: '{{.VERSION | default ""}}'
            _MSG: '{{.MSG | default (printf "Pre-release %s" .VERSION)}}'
        preconditions:
            - sh: git -C {{._0}} rev-parse --git-dir > /dev/null 2>&1
              msg: Not inside a git repository.
            - sh: '[[ "{{.VERSION}}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(rc|beta|alpha)\.?[0-9]*$ ]]'
              msg: 'VERSION must be a pre-release semver like `v1.0.0-rc.1`.'
        prompt: 'Create pre-release tag `{{.VERSION}}` at HEAD and push to `{{.GIT_REMOTE}}`?'
        cmds:
            - cmd: git -C {{._0}} tag -a '{{.VERSION}}' HEAD -m '{{._MSG}}'
            - cmd: git -C {{._0}} push '{{.GIT_REMOTE}}' '{{.VERSION}}'

    # -------------
    # Utilities
    # -------------
    tag:list:
        desc: List all git tags, sorted by version (newest first).
        cmd: git -C {{._0}} tag -l --sort=-v:refname

    tag:push:
        desc: Push all local tags to the remote.
        cmd: git -C {{._0}} push '{{.GIT_REMOTE}}' --tags

    tag:clean:
        desc: >-
            Prune local tags (and stale remote-tracking branches) that no longer
            exist on the remote.
        cmd: git -C {{._0}} fetch '{{.GIT_REMOTE}}' --prune --prune-tags

    agent:new:
        cmd: '{{.AWT}} new {{.CLI_ARGS}}'
        desc: 'Provision an isolated worktree+branch: `task agent:new -- MEMY-88 "short desc"`.'
        aliases: ['wt:new']

    agent:list:
        cmd: '{{.AWT}} list'
        desc: List the live agent/* worktrees with ahead/dirty status.
        aliases: ['wt:list', 'wt:ls']

    agent:merge:
        cmd: '{{.AWT}} merge {{.CLI_ARGS}}'
        desc: 'Land a reviewed branch into local main (never pushes): `task agent:merge -- agent/<branch>`.'
        aliases: ['wt:merge', 'wt:land']

    agent:abandon:
        cmd: '{{.AWT}} abandon {{.CLI_ARGS}}'
        desc: 'Discard a rejected branch + its worktree: `task agent:abandon -- agent/<branch>`.'
        aliases: ['wt:abandon']

    agent:gc:
        cmd: '{{.AWT}} gc'
        desc: Prune merged agent/* branches past the grace window.
        aliases: ['wt:gc']

    sync:
        cmd: '{{.UV}} sync --all-extras {{.CLI_ARGS}}'
        aliases: [install, setup]
        desc: Install & verify dependencies through `uv sync`, including all optional and dev
            dependencies.

    # ----------
    # Evaluation
    # ----------
    eval:
        desc: Statically assess the codebase without applying formatting.
        deps:
            - eval:lint
            - eval:typecheck
            - eval:format

    eval:lint:
        cmd: '{{.UV}} run ruff check {{.CLI_ARGS}}'
        desc: Catch logic & semantic errors with `ruff check`.
        aliases: [ch, ruff, check]

    eval:typecheck:
        cmd: '{{.UV}} run pyrefly check {{.CLI_ARGS}}'
        desc: Verify types and import structure with `pyrefly check`.
        aliases: [ty, types]

    eval:format:
        cmd: '{{.UV}} run ruff format {{.CLI_ARGS}}'
        desc: Fix any formatting issues in our python code, saving the files in place with changes.
        aliases: [fm, fmt, format]

    # -------
    # Testing
    # -------
    test:
        cmd: '{{.UV}} run pytest {{.CLI_ARGS}}'
        aliases: [pt, tests, pytest]
        desc: Dynamically assess the codebase by running `pytest` with no filters applied.

    test:dev:
        cmd: '{{.UV}} run pytest --sw -vv {{.CLI_ARGS}}'
        aliases: [dev-test]
        desc: Run iterative developer tests that stop upon first failure, showing extra output
            and skipping code coverage.

    test:pdb:
        cmd: '{{.UV}} run pytest -s --pdb --sw -vv {{.CLI_ARGS}}'
        aliases: [pdb-test, debug-test]
        desc: The same as dev-test, but also drop into the interactive debugger upon exception
            or failure.

    test:ssu:
        cmd: '{{.UV}} run pytest --snapshot-update {{.CLI_ARGS}}'
        aliases: [snapshot-test, ssu-test, snap-test]
        desc: Update regression test "snapshot" files to reflect the new truth.

    test:cov:
        cmd: >-
            {{.UV}} run pytest --cov "{{._PACKAGE}}" --cov-branch --no-cov-on-fail {{.CLI_ARGS}}
            --cov-report term-missing --cov-report markdown:tests/coverage.md

        aliases: [coverage, cov-test, coverage-test]
        desc: Report code coverage of our unit tests to stdout and `tests/coverage.md`.

    # -------------
    # Documentation
    # -------------
    docs:
        desc: Run the full documentation pipeline.
        aliases: [sphinx]
        cmds:
            - task: docs:sync
            - task: docs:build

    docs:sync:
        desc: Update generated docs from source code.
        aliases: [sync-docs, sphinx-sync]
        cmd: '{{.UV}} run sync-docs {{.CLI_ARGS}}'
        sources: ['{{.SRC_DIR}}/**/*.py']
        generates: ['{{.DOC_DIR}}/*.md']

    docs:build:
        desc: Build the MyST docs into finalized webpages.
        aliases: [build-docs]
        # `--nitpicky` is intentionally omitted: it floods on internal TypeVars and third-party
        # types without a doc inventory (regex, pydantic-internal), which `--fail-on-warning`
        # would then treat as hard errors. This matches the Read the Docs build (which also does
        # not run nitpicky), so local and hosted builds agree. `--fail-on-warning` still catches
        # real problems (broken toctrees, bad cross-refs).
        cmd: >-
            {{.UV}} run sphinx-build --fail-on-warning {{.CLI_ARGS}}
            {{.DOC_DIR}} {{.DOC_OUT}}
        sources:
            - '{{.DOC_DIR}}/**/*.md'
            - '{{.DOC_DIR}}/conf.py'
        generates: ['{{.DOC_OUT}}/*']

    docs:clean:
        desc: Remove all generated documentation files.
        aliases: [clean-docs, sphinx-clean]
        cmd: rm -rf {{.DOC_OUT}}/*

    docs:publish:
        desc: Publish finalized Sphinx artifacts to ReadTheDocs.
        aliases: [publish-docs, readthedocs]
        cmd: echo "docs:publish not yet implemented..."
        preconditions: ['false']

    # ---------------
    # Container Image
    # ---------------
    pod:build:
        cmd: '{{.OP}} build -t {{.IMG}} -f {{.IMG_FILE}} {{._0}}'
        desc: Build the container image.
        sources:
            - '{{._0}}/{{.IMG_FILE}}'
            - '{{._0}}/.repo.yaml'
        generates:
            - '{{.OP}} image inspect {{.IMG}}'
        preconditions:
            - sh: stat {{._0}}/{{.IMG_FILE}}
              msg: Containerfile not found in `{{.IMG_FILE}}`.
            - sh: stat {{._0}}/.repo.yaml
              msg: Repo data not found in `.repo.yaml`

    pod:test:
        cmd: >-
            {{.OP}} run --rm -v {{._0}}:/workspace:ro {{.IMG}} run pytest {{.CLI_ARGS}}
        desc: Run the test suite inside the container locally (mirrors the CI job).
        deps: ['pod:build']

    pod:push:
        cmd: '{{.OP}} push {{.IMG}}'
        desc: Push the built image to the GitLab Container Registry.

    # --------------
    # PyPI Packaging
    # --------------
    pkg:build:
        cmd: '{{.UV}} build --no-sources --format wheel {{.CLI_ARGS}}'
        desc: Build a distributable wheel of this package through `uv build`.

    pkg:publish:
        cmd: '{{.UV}} publish {{.CLI_ARGS}}'
        desc: Upload built distributions to PyPI. Expects PYPI_TOKEN to be set in the environment.
        env:
            UV_PUBLISH_TOKEN: '{{.PYPI_TOKEN}}'
        preconditions:
            - sh: '[[ -n $PYPI_TOKEN ]]'
              msg: PYPI_TOKEN environment variable is not set.

    pkg:publish:check:
        cmd: '{{.UV}} publish --dry-run {{.CLI_ARGS}}'
        desc: Validate the distribution without uploading (dry run).

    pkg:publish:test:
        cmd: >-
            {{.UV}} publish --publish-url https://test.pypi.org/legacy/ {{.CLI_ARGS}}
        desc: Upload to TestPyPI for verification before a real release.
        env:
            UV_PUBLISH_TOKEN: '{{.PYPI_TEST_TOKEN}}'
        preconditions:
            - sh: '[[ -n $PYPI_TEST_TOKEN ]]'
              msg: PYPI_TEST_TOKEN environment variable is not set.

    pkg:release:
        desc: >-
            Full release — bump version, build wheel, and publish to PyPI. Override
            BUMP= to control the increment (major, minor, patch).
        cmds:
            - cmd: '{{.UV}} version --bump {{.BUMP | default "patch"}}'
            - task: pkg:build
            - task: pkg:publish

    pkg:release:patch:
        desc: Release a new patch version (e.g. 1.2.3 → 1.2.4).
        vars:
            BUMP: 'patch'
        cmds:
            - task: pkg:release

    pkg:release:minor:
        desc: Release a new minor version (e.g. 1.2.3 → 1.3.0).
        vars:
            BUMP: 'minor'
        cmds:
            - task: pkg:release

    pkg:release:major:
        desc: Release a new major version (e.g. 1.2.3 → 2.0.0).
        vars:
            BUMP: 'major'
        cmds:
            - task: pkg:release
