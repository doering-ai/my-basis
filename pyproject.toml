###################
### I. METADATA ###
###################
[project]
name = "my-basis"
version = "0.9.0"
description = "A shared repository of basic python utilties for clean, functional text processing."
readme = "README.md"
authors = [{ name = "Robb Doering", email = "robb@doering.ai" }]
license = "MPL-2.0"
requires-python = ">=3.13"
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python :: 3.13",
  "Operating System :: OS Independent",
  "Framework :: OpenTelemetry",
  "Framework :: Pydantic :: 2",
  "Framework :: Pytest",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: System :: Logging",
  "Topic :: Text Processing :: Markup :: Markdown",
  "Topic :: Text Processing :: General",
  "Topic :: Utilities",
  "Typing :: Typed",
]
urls = { Homepage = "https://gitlab.com/doering-ai/modules/basis" }


########################
### II. DEPENDENCIES ###
########################
dependencies = [
  "dotenv>=0.9.9",
  "jinja2>=3.1.6",
  "mdformat>=0.7.22",
  "more-itertools>=10.7.0",
  "numpy>=2.4.1",
  "pydantic>=2.11.7",
  "python-dateutil>=2.9.0.post0",
  "regex>=2024.4.28",
  "srsly>=2.5.1",
  "tomli-w>=1.2.0",
  "toolz>=1.1.0",
  "tqdm>=4.67.1",
  "unidecode>=1.4.0",
]

[project.optional-dependencies]
aiohttp = ["aiohttp>=3.12.15"]
sql = ["sqlalchemy>=2.0.45"]
myst = ["mdformat-front-matters>=2.0.0", "mdformat-myst>=0.3.0"]
metrics = [
  "opentelemetry-instrumentation-aiohttp-client>=0.57b0",
  "opentelemetry-instrumentation-asgi>=0.57b0",
  "logfire[system-metrics]>=4.3.5",
  "pandas>=2.3.2",
]
google = [
  "google-api-python-client>=2.179.0",
  "google-auth-httplib2>=0.2.0",
  "google-auth-oauthlib>=1.2.2",
  "pandas>=2.3.2",
]

[dependency-groups]
dev = [
  "better-exceptions>=0.3.3",
  "bpython>=0.26",
  { include-group = "lint" },
  { include-group = "test" },
  { include-group = "docs" },
]
lint = [
  "ruff>=0.14.10",
  "types-python-dateutil>=2.9.0.20250822",
  "types-regex>=2025.7.34.20250809",
  "types-tqdm>=4.67.0.20250809",
  "pandas-stubs>=2.3.0.250703",
  "basedpyright>=1.39.0",
]
test = [
  "coverage>=7.10.5",
  "pytest-asyncio>=1.1.0",
  "pytest-cov>=6.2.1",
  "pytest>=8.4.1",
  "syrupy>=5.1.0",
]
docs = [
  "furo>=2025.12.19",
  "linkify-it-py>=2.0.3",
  "myst-parser>=4.0.1",
  "sphinx>=8.2.3",
  "sphinx-hoverxref>=1.4.2",
  "sphinx-last-updated-by-git>=0.3.8",
  "sphinx-notfound-page>=1.1.0",
  # "sphinx-rtd-theme>=3.0.2",
]


#########################
### III. BUILD SYSTEM ###
#########################
[build-system]
requires = ["uv_build>=0.11.7,<0.12"]
build-backend = "uv_build"
[tool.uv.build-backend]
module-name = 'my'
module-root = ''

# [tool.uv.sources]
# myst-mdformat = { path = "../libs/basis", editable = true }

#############################
### IV. DEVELOPMENT TOOLS ###
#############################
[tool.ty.src]
exclude = ["my/templates/"]

[tool.pytest]
testpaths = ["tests"]

[tool.coverage.report]
# Regexes for lines to exclude from consideration
exclude_also = [
  # Don't complain about missing debug-only code:
  'def __repr__',
  'if +(\w+\.)?(?i:debug):',

  # Don't complain if tests don't hit defensive assertion code:
  'assert ',
  'raise AssertionError',
  'raise NotImplementedError',

  # Don't complain if non-runnable code isn't run:
  'if 0:',
  'if __name__ == .__main__.:',

  # Don't complain about abstract methods, they aren't run:
  '@(abc\.)?abstractmethod',

  # One-line global constants
  '^([a-z]\w+?\.)?[A-Z][_A-Z]+(:[^=\n]+)? *=[^\n]+(?=\n\S)',
]
omit = ["__init__.py", "my/templates/*", "scratch.py", "*/.venv/*"]
ignore_errors = true
