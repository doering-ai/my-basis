# Guided overall by https://docs.astral.sh/uv/guides/integration/gitlab/
############
### HEAD ###
############
# These will be executed in turn, corresponding to one or more jobs below
stages:
    - build
    - eval
    - test
    - release
# Import static analysis tools
include:
    - template: Security/Secret-Detection.gitlab-ci.yml
    - component: gitlab.com/gitlab-org/professional-services-automation/tools/utilities/pipeintel/pipeintel@1.0.0
      inputs:
        stage: eval
        offline: true
# Determine when this pipeline should run
workflow:
    rules:
        # Never run for draft commits
        - if: '$CI_COMMIT_TITLE =~ /-draft$/ || $CI_MERGE_REQUEST_DRAFT == "true"'
          when: never
        # Run for merge requests and pushes to the main branch
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
        # Run for version tags -- this is what creates the pipeline the PyPI publish
        # job lives in. WITHOUT this rule a `v*` tag push matches nothing and GitLab
        # creates no pipeline at all, so the job-level `rules:` can never fire.
        - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
        # The independent Typst package shares this repository, not Python's tags.
        - if: $CI_COMMIT_TAG =~ /^typst-v\d+\.\d+\.\d+$/
############
### DATA ###
############
variables:
    PACKAGE: my
    USER: my
    DOCKER_TLS_CERTDIR: /certs
    # Every non-release job consumes the image built for this exact source SHA in the
    # current pipeline. `:latest` remains a convenience tag, never a test prerequisite.
    TEST_POD: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    MAIN_POD: $CI_REGISTRY_IMAGE:latest
    PYTHON_FLOOR: '3.12'
    # Enable GitLabs free secret detection -- see `secret_detection` job
    SECRET_DETECTION_ENABLED: 'true'
    # Where uv caches wheels/downloads -- kept inside the project so GitLab can cache it.
    UV_CACHE_DIR: .uv-cache
cache:
    key:
        files:
            - uv.lock
    paths:
        - $UV_CACHE_DIR
############
### BODY ###
############
default:
    image:
        name: $MAIN_POD
        entrypoint: [""]
secret_detection:
    stage: eval
    cache: []
.docker:
    image: docker:26
    services: ['docker:26-dind']
    before_script:
        - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u gitlab-ci-token --password-stdin
    cache: []
Rebuild Pod:
    stage: build
    extends: .docker
    script:
        - docker build --pull -t $TEST_POD -f Containerfile .
        - docker push $TEST_POD
    rules:
        # A release tag points at a commit already proven on `main`; publishing uses
        # its own uv image and remains independent of this build.
        - if: $CI_COMMIT_TAG
          when: never
        # Build on every MR/default-branch pipeline. The SHA tag is the proof that
        # eval and matrix jobs cannot fall back to a stale promoted image.
        - when: on_success
Release Pod:
    stage: release
    extends: .docker
    script:
        - docker pull $TEST_POD
        - docker tag $TEST_POD $MAIN_POD
        - docker push $MAIN_POD
    rules:
        # Promotion happens only after the SHA image has passed eval and tests. No
        # earlier job consumes `:latest`, so promotion can never bootstrap the matrix.
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
# PyPI trusted publishing (OIDC) -- no long-lived token. Triggered by a `v*` tag
# (see the workflow rule above). GitLab mints a short-lived id_token bound to the
# top-level pipeline; we exchange it at PyPI's mint endpoint for a project-scoped
# token that expires in <=15 min, then `uv publish`. uv has NO GitLab auto-detect,
# so the exchange is manual and lives here.
#
# PREREQUISITES (one-time, operator, PyPI/GitLab side -- the job is inert without
# them): (1) register a Trusted Publisher on PyPI for my-basis -- provider GitLab
# CI/CD, namespace doering-ai, project libs/basis, pipeline `.gitlab-ci.yml`, env
# `pypi`; (2) mark the `pypi` environment PROTECTED with required approval so the
# release stays a deliberate, logged human decision.
Publish PyPI:
    stage: release
    # Self-contained uv+python image; python3 (stdlib urllib) does the exchange.
    # On self-hosted shell runners the image is ignored; uv+python3 come from the
    # host. On shared Docker runners it provides an isolated uv+python environment.
    image:
        name: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
        entrypoint: [""]
    tags:
        - self-hosted
    before_script:
        - export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
        - export UV_PYTHON="3.13"
        - export UV_CACHE_DIR="$HOME/.uv-cache"
        - cd $CI_PROJECT_DIR
        # Refuse to publish if the tag and the packaged version disagree: `uv build` reads the
        # version from pyproject.toml, not from $CI_COMMIT_TAG, so a tag cut against a stale
        # version would otherwise upload mislabeled artifacts. Fail loudly instead. NO_COLOR
        # stops uv from wrapping the version in ANSI codes under an ambient FORCE_COLOR.
        - PKG_VERSION="$(NO_COLOR=1 uv version --short)"
        - test "v$PKG_VERSION" = "$CI_COMMIT_TAG" || { echo "Tag $CI_COMMIT_TAG does not match
          pyproject v$PKG_VERSION"; exit 1; }
    id_tokens:
        PYPI_ID_TOKEN:
            aud: pypi
    rules:
        - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
          when: manual
    allow_failure: false
    environment: pypi
    # Decouple from the eval/test stages: the release must publish independently,
    # never blocked by a slow or hung eval-stage job (e.g. the pipeintel component,
    # which can't be scoped off tag pipelines). The tag is cut from green `main`.
    needs: []
    cache: []
    script:
        - uv build --no-sources
        - python3 scripts/check_release_artifacts.py dist/*.whl dist/*.tar.gz
        - |
          export UV_PUBLISH_TOKEN=$(python3 -c '
          import json, os, urllib.request
          req = urllib.request.Request(
              "https://pypi.org/_/oidc/mint-token",
              data=json.dumps({"token": os.environ["PYPI_ID_TOKEN"]}).encode(),
              headers={"Content-Type": "application/json"},
          )
          print(json.load(urllib.request.urlopen(req))["token"])
          ')
        # NOTE: uploads only. `uv publish` uploads PEP 740 attestations if present
        # in dist/ but does NOT generate them; provenance needs a separate signing
        # step (deferred -- see MEMY-247's trailing work item).
        - uv publish
Evaluate Python:
    stage: eval
    image:
        name: $TEST_POD
        entrypoint: [""]
    needs: ['Rebuild Pod']
    variables:
        UV_LOCKED: '1'
    # Lint/typecheck is always fast; a longer run is a hang, not real work. Cap it
    # so a transient runner/registry stall can't burn a full job-timeout of shared
    # compute (a 1h stall on the v0.8.2 tag pipeline is what prompted this).
    timeout: 10m
    # A release tag is cut from already-green `main` -- no need to re-lint it.
    rules:
        - if: $CI_COMMIT_TAG
          when: never
        - when: on_success
    before_script:
        - cd $CI_PROJECT_DIR
        - uv lock --check
        - uv sync --locked --all-extras --python "$PYTHON_FLOOR"
    interruptible: true
    script:
        - uv run --locked ruff check --output-format=gitlab --output-file=code-quality-report.json
        - uv run --locked ruff format --diff
        - uv run --locked pyrefly check
    artifacts:
        reports:
            codequality: $CI_PROJECT_DIR/code-quality-report.json
Test Python:
    stage: test
    image:
        name: $TEST_POD
        entrypoint: [""]
    needs: ['Rebuild Pod', 'Evaluate Python']
    variables:
        UV_LOCKED: '1'
    timeout: 30m
    # A release tag is cut from already-green `main` -- no need to re-run tests.
    rules:
        - if: $CI_COMMIT_TAG
          when: never
        - when: on_success
    before_script:
        - cd $CI_PROJECT_DIR
        - uv lock --check
        - uv sync --locked --all-extras --python "$PYTHON_FLOOR"
    script:
        - task test:cov
    coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
Test Artifacts:
    stage: test
    image:
        name: $TEST_POD
        entrypoint: [""]
    needs: ['Rebuild Pod', 'Evaluate Python']
    timeout: 10m
    rules:
        - if: $CI_COMMIT_TAG
          when: never
        - when: on_success
    before_script:
        - cd $CI_PROJECT_DIR
        - uv lock --check
        - uv sync --locked --all-extras --python "$PYTHON_FLOOR"
    script:
        - task test:artifacts
Test Typst:
    stage: test
    image:
        name: ghcr.io/typst/typst@sha256:032e292249bcd378480cc7c142cfa324b63ef8aadeb88d7e7230320c4c9c422f
        entrypoint: [""]
    cache: []
    timeout: 10m
    rules:
        - if: $CI_COMMIT_TAG =~ /^typst-v\d+\.\d+\.\d+$/
        - if: $CI_COMMIT_TAG
          when: never
        - when: on_success
    script:
        - |
          if [ -n "${CI_COMMIT_TAG:-}" ]; then
            TYPST_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' typst/typst.toml)"
            test "typst-v$TYPST_VERSION" = "$CI_COMMIT_TAG" || {
              echo "Tag $CI_COMMIT_TAG does not match typst-v$TYPST_VERSION"
              exit 1
            }
          fi
        - sh typst/test.sh
# `Test Python` above runs the image's baked-in interpreter (python3.12, the declared floor)
# and owns the coverage report -- it stays a single job so the `coverage:` regex cannot race
# across parallel children. This job adds every OTHER supported interpreter.
#
# The image sets `UV_PYTHON_DOWNLOADS=manual`, so the extra interpreters must be provisioned
# EXPLICITLY -- that is the point: no job silently acquires a runtime it did not ask for.
Test Python Matrix:
    stage: test
    image:
        name: $TEST_POD
        entrypoint: [""]
    needs: ['Rebuild Pod', 'Evaluate Python']
    variables:
        UV_LOCKED: '1'
    timeout: 30m
    parallel:
        matrix:
            - PYVER: ['3.13', '3.14']
    rules:
        - if: $CI_COMMIT_TAG
          when: never
        - when: on_success
    before_script:
        - cd $CI_PROJECT_DIR
        - uv python install "$PYVER"
        - uv lock --check
        - uv sync --locked --all-extras --python "$PYVER"
    script:
        # The environment was synchronized explicitly above. `--no-sync` makes a
        # second, implicit resolver pass impossible while `--locked` reasserts the lock.
        - uv run --locked --no-sync --python "$PYVER" pytest -q
