    - '2019'
    - '2029'
    - '2030'
    - '2040'
    - '2099'
    - '123'
    # Negative:
    - ['20245']

m:
    - '1'
    - '01'
    - '09'
    - '10'
    - '11'
    - '12'
    # Negative:
    - ['13']
    - ['20']
    - ['00']

d:
    - '1'
    - '01'
    - '15'
    - '28'
    - '29'
    - '30'
    - '31'
    # Negative:
    - ['32']
    - ['40']
    - ['99']

_symbolic_date:
    - '2024/01/15'
    - '2024-12-31'
    - '2024.06.01'
    - '99/12/25'
    - '2024/01'
    - '2024-12'
    - '01/2024'
    - '12/31/2024'
    - '15-06-99'
