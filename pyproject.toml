[project]
name = "MyBasis"
version = "0.1.0"
description = "A shared repository of basic python utilties for clean, functional text processing."
readme = "README.md"
authors = [{ name = "Robb Doering", email = "robb@doering.ai" }]
license = "Unlicense"
requires-python = ">=3.12"
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: The Unlicense (Unlicense)",
    "Operating System :: OS Independent",
    "Framework :: OpenTelemetry",
    "Framework :: Pydantic :: 2",
    "Framework :: Pytest",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Logging",
    "Topic :: Text Processing :: Markup :: Markdown",
    "Topic :: Text Processing :: General",
    "Topic :: Utilities",
    "Typing :: Typed",
]
dependencies = [
    "aiofiles>=25.1.0",
    "aiohttp>=3.12.15",
    "better-exceptions>=0.3.3",
    "coverage>=7.10.5",
    "dotenv>=0.9.9",
    "google-api-python-client>=2.179.0",
    "google-auth-httplib2>=0.2.0",
    "google-auth-oauthlib>=1.2.2",
    "jinja2>=3.1.6",
    "logfire[system-metrics]>=4.3.5",
    "mdformat>=0.7.22",
    "more-itertools>=10.7.0",
    "opentelemetry-instrumentation-aiohttp-client>=0.57b0",
    "opentelemetry-instrumentation-asgi>=0.57b0",
    "pandas>=2.3.2",
    "pandas-stubs>=2.3.0.250703",
    "pydantic>=2.11.7",
    "pytest>=8.4.1",
    "pytest-asyncio>=1.1.0",
    "pytest-cov>=6.2.1",
    "python-dateutil>=2.9.0.post0",
    "regex>=2024.4.28",
    "requests>=2.32.5",
    "sqlmodel>=0.0.24",
    "srsly>=2.5.1",
    "tqdm>=4.67.1",
    "ty>=0.0.1a28",
    "types-python-dateutil>=2.9.0.20250822",
    "types-regex>=2025.7.34.20250809",
    "types-tqdm>=4.67.0.20250809",
    "unidecode>=1.4.0",
]

[project.urls]
Homepage = "https://gitlab.com/doering-thinking-machines/modules/basis"

[build-system]
requires = ["uv_build>=0.8.13,<0.9.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "my"
module-root = ""

[tool.ty.src]
exclude = ["my/data/"]