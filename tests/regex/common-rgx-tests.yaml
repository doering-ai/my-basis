# General patterns
_nw:
    - '!'
    - '@'
    - '#'
    - '$'
    - '_'
    - ' '
    - "\n"
    - "\t"
    # Negative:
    - [a]
    - [Z]
    - [5]

_delim:
    - {text: '^start', func: search}
    - {text: 'end$', func: search}
    - {text: 'word!next', func: search}
    - {text: 'word@next', func: search}
    - {text: 'word#next', func: search}
    # Negative (these are not delimiters):
    - ['word-next']
    - ['word.next']
    - ['word next']

_ws:
    - {text: ' word', func: search}
    - {text: 'test word', func: search}
    - {text: '(word', func: search}
    - {text: 'start', func: search}
    # Negative:
    - ['&word']
    - ['test&word']

_we:
    - {text: 'word ', func: search}
    - {text: 'word)', func: search}
    - {text: 'word!', func: search}
    - {text: 'word', func: search}
    # Negative:
    - ['word&']
    - ['wordalpha']

# Web patterns
_http:
    - 'http://'
    - 'https://'
    - 'HTTP://'
    - 'HTTPS://'
    - 'www.'
    - 'www2.'
    - 'http://www.'
    - 'https://www.'
    # Negative:
    - ['ftp://']
    - ['htp://']
    - ['ww.']

tld:
    - {text: abc.com, func: search}
    - {text: abc.org, func: search}
    - {text: abc.edu, func: search}
    - {text: abc.uk, func: search}
    - {text: abc.co, func: search}
    - {text: abc.info, func: search}
    # Negative:
    - {text: 'abc.COM', func: search, expect_none: True}
    - {text: 'abc.a', func: search, expect_none: True}
    - {text: 'abc.12345', func: search, expect_none: True}
    - {text: 'abc.domain.', func: search, expect_none: True}
    - {text: 'domain.', func: search, expect_none: True,}

url:
    - ['http://uchicago.edu/founders', 'uchicago.edu/founders']
    - ['https://www.example.com/page', 'example.com/page']
    - ['www.google.com/search?q=test', 'google.com/search?q=test']
    - ['http://github.com/user/repo', 'github.com/user/repo']
    - ['example.org/path/to/page', 'example.org/path/to/page']
    - ['www.site.co.uk/page', 'site.co.uk/page']
    - ['https://sub.domain.com/a/b/c', 'sub.domain.com/a/b/c']
    # Archive URLs get cleaned:
    - ['web.archive.org/web/20081205101019/http://www.site.org', 'site.org']
    # Negative:
    - ['not-a-url']
    - ['just.text']
    - ['co/short']

md_url:
    - {text: '[link text](http://example.com)', alias: link text, target: 'http://example.com'}
    - {text: '[GitHub](https://github.com)', alias: GitHub, target: 'https://github.com'}
    - {text: '[my site](www.example.org/page)', alias: my site, target: www.example.org/page}
    - {text: '[ spaces ](http://test.com)', alias: spaces, target: 'http://test.com'}
    - {text: '[one\ntwo](url)', func: search, alias: 'one\ntwo', target: url}
    # Regression: a target containing a balanced inner `)` used to get truncated at the first
    # `)`, chopping Wikipedia-style URLs like `.../wiki/Foo_(bar)` down to `.../wiki/Foo_(bar`.
    - {text: '[wiki link](https://en.wikipedia.org/wiki/Python_(programming_language))', alias: wiki
        link, target: 'https://en.wikipedia.org/wiki/Python_(programming_language)'}
    # Negative (image syntax):
    - ['![image](url.png)']
    # Negative (not markdown links):
    - ['[text] (url)']
    - ['text(url)']

