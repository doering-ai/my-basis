# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

env:
    FORCE_COLOR: 1
    GREETING: Hello, world!
    SPHINX_PARSE: uv run sphinx-apidoc
    SPHINX_BUILD: uv run sphinx-build
    SRC_DIR: ./my/
    RST_DIR: ./docs/
    OUT_DIR: ./docs/_build/

dotenv: ['.env']

tasks:
    # ------
    # PyTest
    # ------
    test: uvr pytest {{.CLI_ARGS}}

    test_dev: uvr pytest --sw -s --pdb -vv --durations=5 --durations-min=0.005 -k
        "${PYTEST_TARGET}" {{.CLI_ARGS}}

    test_cov: uvr pytest --cov=my --cov-report=term-missing {{.CLI_ARGS}} -p

    # ------
    # Sphinx
    # ------
    parse_docs: uvr sphinx-apidoc
    build_docs: uvr sphinx-build
    docs:
        cmds:
            - task: parse_docs
            - task: build_docs

