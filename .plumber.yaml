# Plumber configuration (https://github.com/getplumber/plumber)
# Generated by: plumber config init

version: "1.0"
controls:
  containerImageMustNotUseForbiddenTags:
    enabled: true
    tags:
    - latest
    - dev
    - development
    - staging
    - main
    - master
    containerImagesMustBePinnedByDigest: false
  containerImageMustComeFromAuthorizedSources:
    enabled: true
    trustedUrls:
    - docker.io/docker:*
    - gcr.io/kaniko-project/*
    - $CI_REGISTRY_IMAGE:*
    - $CI_REGISTRY_IMAGE/*
    - getplumber/plumber:*
    - docker.io/getplumber/plumber:*
    - registry.gitlab.com/security-products/*
    trustDockerHubOfficialImages: true
  branchMustBeProtected:
    enabled: true
    namePatterns:
    - main
    - master
    - release/*
    - production
    - dev
    defaultMustBeProtected: true
    allowForcePush: false
    codeOwnerApprovalRequired: false
    minMergeAccessLevel: 30
    minPushAccessLevel: 40
  pipelineMustNotIncludeHardcodedJobs:
    enabled: true
  includesMustBeUpToDate:
    enabled: true
  includesMustNotUseForbiddenVersions:
    enabled: true
    forbiddenVersions:
    - latest
    - ~latest
    - main
    - master
    - HEAD
    defaultBranchIsForbiddenVersion: false
  pipelineMustNotEnableDebugTrace:
    enabled: true
    forbiddenVariables:
    - CI_DEBUG_TRACE
    - CI_DEBUG_SERVICES
  pipelineMustNotUseUnsafeVariableExpansion:
    enabled: true
    dangerousVariables:
    - CI_MERGE_REQUEST_TITLE
    - CI_MERGE_REQUEST_DESCRIPTION
    - CI_COMMIT_MESSAGE
    - CI_COMMIT_TITLE
    - CI_COMMIT_TAG_MESSAGE
    - CI_COMMIT_REF_NAME
    - CI_COMMIT_REF_SLUG
    - CI_COMMIT_BRANCH
    - CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
    - CI_EXTERNAL_PULL_REQUEST_SOURCE_BRANCH_NAME
  securityJobsMustNotBeWeakened:
    enabled: true
    securityJobPatterns:
    - '*-sast'
    - secret_detection
    - container_scanning
    - '*_dependency_scanning'
    - gemnasium-*
    - dast
    - dast_*
    - license_scanning
    allowFailureMustBeFalse:
      enabled: false
    rulesMustNotBeRedefined:
      enabled: true
    whenMustNotBeManual:
      enabled: true
  pipelineMustNotExecuteUnverifiedScripts:
    enabled: true
  pipelineMustNotOverrideJobVariables:
    enabled: true
    variables:
    - SECURE_ANALYZERS_PREFIX
    - SAST_DISABLED
    - SAST_EXCLUDED_PATHS
    - SAST_EXCLUDED_ANALYZERS
    - SECRET_DETECTION_DISABLED
    - SECRET_DETECTION_EXCLUDED_PATHS
    - CONTAINER_SCANNING_DISABLED
    - DAST_DISABLED
    - DEPENDENCY_SCANNING_DISABLED
    - LICENSE_SCANNING_DISABLED
  pipelineMustNotUseDockerInDocker:
    enabled: true
    detectInsecureDaemon: true
