[project]
name = "MyBasis"
version = "0.1.0"
description = "A shared repository of basic python utilties for clean, functional text processing."
readme = "README.md"
license = "Unlicense"
requires-python = ">=3.13"
dependencies = [
    "aiohttp>=3.12.15",
    "better-exceptions>=0.3.3",
    "coverage>=7.10.5",
    "dotenv>=0.9.9",
    "google-api-python-client>=2.179.0",
    "google-auth-httplib2>=0.2.0",
    "google-auth-oauthlib>=1.2.2",
    "jinja2>=3.1.6",
    "logfire[system-metrics]>=4.3.5",
    "mdformat>=0.7.22",
    "more-itertools>=10.7.0",
    "opentelemetry-instrumentation-aiohttp-client>=0.57b0",
    "opentelemetry-instrumentation-asgi>=0.57b0",
    "ovld>=0.5.12",
    "pandas>=2.3.2",
    "pandas-stubs>=2.3.0.250703",
    "pydantic>=2.11.7",
    "pyright>=1.1.405",
    "pytest>=8.4.1",
    "pytest-asyncio>=1.1.0",
    "pytest-cov>=6.2.1",
    "python-dateutil>=2.9.0.post0",
    "pyyaml>=6.0.2",
    "regex>=2024.4.28",
    "requests>=2.32.5",
    "sqlmodel>=0.0.24",
    "srsly>=2.5.1",
    "types-python-dateutil>=2.9.0.20250822",
    "types-pyyaml>=6.0.12.20250822",
    "types-regex>=2025.7.34.20250809",
    "unidecode>=1.4.0",
    "yapf>=0.43.0",
]


[build-system]
requires = ["uv_build>=0.8.13,<0.9.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "my"
module-root = ""

[dependency-groups]
dev = []

